name: Copilot Code Review

on:
  schedule:
    - cron: '0 0 * * 5'  # Every Friday at midnight UTC

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load review prompt
        id: prompt
        run: echo "content<<EOF" >> $GITHUB_OUTPUT && cat .github/review-prompt.md >> $GITHUB_OUTPUT && echo "EOF" >> $GITHUB_OUTPUT

      - name: Copilot Code Review
        uses: github/copilot-code-review@v1
        with:
          custom-instructions: ${{ steps.prompt.outputs.content }}
