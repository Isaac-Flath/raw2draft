name: Copilot Code Review

on:
  schedule:
    - cron: '0 0 * * 5'  # Every Friday at midnight UTC

permissions:
  contents: read
  pull-requests: write

jobs:
  copilot-review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Copilot Code Review
        uses: github/copilot-code-review@v1
        with:
          custom-instructions: |
            Focus your review on the following concerns:
            1. Duplicate code or logic – identify repeated blocks, functions, or patterns that could be consolidated.
            2. Confusing naming schemes – flag variables, functions, types, or files whose names are unclear, misleading, or inconsistent with the rest of the codebase.
            3. Dead code – highlight unreachable code, unused variables, imports, functions, or commented-out blocks that should be removed.
