name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Resolve packages
        run: xcodebuild -project Raw2Draft.xcodeproj -scheme Raw2Draft -configuration Release -resolvePackageDependencies

      - name: Build
        run: |
          BUILD_NUM=$(date +%Y%m%d%H%M%S)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" Raw2Draft/Resources/Info.plist
          xcodebuild -project Raw2Draft.xcodeproj \
            -scheme Raw2Draft \
            -configuration Release \
            -derivedDataPath build \
            build

      - name: Create DMG
        run: |
          APP_PATH="build/Build/Products/Release/Raw2Draft.app"
          DMG_NAME="Raw2Draft-${GITHUB_REF_NAME}.dmg"

          # Create a temporary directory for the DMG contents
          mkdir -p dmg-staging
          cp -R "$APP_PATH" dmg-staging/
          ln -s /Applications dmg-staging/Applications

          # Create the DMG
          hdiutil create -volname "Raw2Draft" \
            -srcfolder dmg-staging \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.DMG_NAME }}
          generate_release_notes: true
          body: |
            ## Installation

            1. Download the DMG below
            2. Open it and drag **Raw2Draft** to the **Applications** folder
            3. On first launch, right-click the app and select **Open** (required for unsigned apps)

            ### Requirements
            - macOS 14.0+
            - [Claude CLI](https://claude.ai/download) installed

            > **Note:** This build is not code-signed or notarized. macOS will show a security prompt on first launch — use right-click > Open to bypass it.
